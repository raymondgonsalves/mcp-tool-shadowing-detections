id: 8d5e3f2a-4c9b-4d8e-b7c6-2e3f4a5b6c7d
name: MCP Poisoned Tool Description Ingested
description: |
  Detects MCP tool descriptions containing instruction-like keyword patterns
  characteristic of prompt-injection attacks embedded in the description
  field. This rule is the content-pattern detection at the description-
  ingestion layer of the Tool Shadowing attack.

  Keyword list mirrors the forwarder's ENRICHER.PROMPT_INJECTION_KEYWORDS
  to maintain a single source of truth: IMPORTANT, you must, do not inform,
  ignore previous, <SYSTEM>, <system>, SYSTEM:. Case-insensitive substring
  match.

  Threat Model Findings 3 (Untrusted Description Surface) and 8 (Unified
  Instructions Problem): the MCP protocol loads tool descriptions into the
  shared LLM context window without inspection or trust separation. This
  rule catches dramatic Tool Shadowing payloads that contain explicit
  instruction markers, but does NOT catch subtler semantic reframings
  (Finding 6 — the Obfuscation Gap). Rule 2 (cross-tool reference) covers
  the V2 attack variant this rule misses.

  Defense-in-depth: Rules 1, 2, and 3 all operate at the description-
  ingestion layer using different signals — keyword patterns, cross-tool
  references, hash drift. Different attack signatures, complementary
  detection logic.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: AzureMonitor(CustomTable)
    dataTypes:
      - MCPProtocolLogs_CL
queryFrequency: PT15M
queryPeriod: PT15M
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1195
tags:
  - MCP
  - ToolShadowing
  - PromptInjection
  - OWASP-ASI01
  - ATLAS-AML.T0051
query: |
  MCPProtocolLogs_CL
  | where EventType == "ToolDescriptionLoaded"
  | where isnotempty(ToolDescription)
  | where ToolDescription matches regex @"(?i)(IMPORTANT|you must|do not inform|ignore previous|<SYSTEM>|<system>|SYSTEM:)"
  | project
      EventTime,
      SessionId,
      HostApp,
      ModelName,
      ServerName,
      ToolName,
      ToolDescription,
      ToolDescriptionHash,
      ToolDescriptionLength,
      IngestionAgent
  | order by EventTime desc
customDetails:
  ServerName: ServerName
  ToolName: ToolName
  ToolDescriptionHash: ToolDescriptionHash
  ToolDescriptionLength: ToolDescriptionLength
  SessionId: SessionId
  HostApp: HostApp
  ModelName: ModelName
  IngestionAgent: IngestionAgent
alertDetailsOverride:
  alertDisplayNameFormat: "MCP poisoned tool description: {{ServerName}}/{{ToolName}}"
  alertDescriptionFormat: |
    Tool description from {{ServerName}}/{{ToolName}} matched instruction-like
    keyword patterns indicating possible prompt injection. Cross-check against
    Rule 2 (cross-tool reference) and Rule 3 (hash drift) on the same event.
    A description firing on Rules 1 and 2 simultaneously is high-confidence
    Tool Shadowing.
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails:
      - ServerName
      - ToolName
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionDuration: PT1H
suppressionEnabled: false
version: 1.0.0
kind: Scheduled
